eval_interval:
    value: 5000
experiment:
    value:
        description: Transformer policy fine-tuned from HW1 checkpoint with RL
        name: hw3_transformer_ppo_seed0
        project: mini-grp-hw3
grpo:
    value:
        chunk_size: 32
        group_size: 8
        kl_coef: 0.04
        num_groups: 16
        ref_update_interval: 0
        wm_horizon: 15
        wm_update_every: 4
init_checkpoint:
    value: checkpoints/grp-ver2/miniGRP.pth
log_interval:
    value: 1000
r_seed:
    value: 0
rl:
    value:
        algorithm: ppo
save_interval:
    value: 50000
sim:
    value:
        episode_length: 200
        eval_episodes: 5
        eval_tasks:
            - 0
        fast_env_output_image: true
        reward_scale: 0.1
        task_set: libero_spatial
        use_fast_env: true
training:
    value:
        anneal_lr: true
        clip_eps: 0.1
        entropy_coeff: 0.001
        gae_lambda: 0.95
        gamma: 0.99
        learning_rate: 3e-05
        max_grad_norm: 0.5
        minibatch_size: 128
        normalize_advantages: true
        normalize_rewards: false
        ppo_epochs: 10
        rollout_length: 2000
        target_kl: 0.01
        total_env_steps: 200000
        value_clip_eps: 50
        value_coeff: 0.5
value:
    value:
        dropout: 0.1
        hidden_dim: 256
        image_shape:
            - 64
            - 64
            - 3
        learning_rate: 0.0003
        max_block_size: 32
        n_blocks: 4
        n_embd: 128
        n_head: 4
        n_patches: 8
        obs_stacking: 1
        patch_size: 8
        use_pose: true
world_model:
    value:
        action_dim: 7
        checkpoint: ???
        deter_dim: 512
        discrete_dim: 32
        hidden_dim: 512
        obs_shape:
            - 3
            - 64
            - 64
        stoch_dim: 32
        type: dreamer
