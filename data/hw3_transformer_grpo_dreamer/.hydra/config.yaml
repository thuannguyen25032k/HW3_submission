experiment:
  name: hw3_transformer_grpo_dreamer_seed0
  project: mini-grp-hw3
  description: Transformer policy fine-tuned from HW1 checkpoint with RL
r_seed: 0
init_checkpoint: checkpoints/grp-ver2/miniGRP.pth
rl:
  algorithm: grpo_worldmodel
sim:
  task_set: libero_spatial
  eval_tasks:
  - 0
  eval_episodes: 5
  episode_length: 200
  use_fast_env: true
  fast_env_output_image: true
  reward_scale: 1.0
training:
  total_env_steps: 200000
  rollout_length: 2048
  ppo_epochs: 10
  minibatch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.1
  value_coeff: 0.5
  entropy_coeff: 0.0
  max_grad_norm: 0.5
  learning_rate: 3.0e-05
  normalize_advantages: true
  normalize_rewards: false
  anneal_lr: true
  target_kl: 0.01
  value_clip_eps: 10.0
grpo:
  group_size: 8
  num_groups: 8
  kl_coef: 0.0
  ref_update_interval: 0
  chunk_size: 32
  wm_horizon: 15
  wm_update_every: 4
world_model:
  checkpoint: checkpoints/dreamer/world_model.pth
  type: dreamer
  obs_shape:
  - 3
  - 64
  - 64
  action_dim: 7
  stoch_dim: 32
  discrete_dim: 32
  deter_dim: 512
  hidden_dim: 512
value:
  hidden_dim: 256
  n_layers: 2
  learning_rate: 0.0003
  shared_network: false
eval_interval: 5000
log_interval: 1000
save_interval: 50000
