hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment.name=hw3_transformer_grpo_dreamer_seed0
    - r_seed=0
    - init_checkpoint=checkpoints/grp-ver2/miniGRP.pth
    - rl.algorithm=grpo_worldmodel
    - sim.task_set=libero_spatial
    - sim.eval_tasks=[0]
    - sim.reward_scale=1.0
    - sim.episode_length=200
    - training.total_env_steps=200000
    - training.learning_rate=3e-5
    - training.entropy_coeff=0.0
    - training.max_grad_norm=0.5
    - training.clip_eps=0.1
    - grpo.group_size=8
    - grpo.wm_horizon=15
    - grpo.wm_update_every=4
    - grpo.chunk_size=32
    - grpo.kl_coef=0.0
    - world_model.checkpoint=checkpoints/dreamer/world_model.pth
    - world_model.type=dreamer
    - world_model.obs_shape=[3,64,64]
    - world_model.action_dim=7
    - world_model.stoch_dim=32
    - world_model.discrete_dim=32
    - world_model.deter_dim=512
    - world_model.hidden_dim=512
  job:
    name: train_transformer_rl
    chdir: null
    override_dirname: experiment.name=hw3_transformer_grpo_dreamer_seed0,grpo.chunk_size=32,grpo.group_size=8,grpo.kl_coef=0.0,grpo.wm_horizon=15,grpo.wm_update_every=4,init_checkpoint=checkpoints/grp-ver2/miniGRP.pth,r_seed=0,rl.algorithm=grpo_worldmodel,sim.episode_length=200,sim.eval_tasks=[0],sim.reward_scale=1.0,sim.task_set=libero_spatial,training.clip_eps=0.1,training.entropy_coeff=0.0,training.learning_rate=3e-5,training.max_grad_norm=0.5,training.total_env_steps=200000,world_model.action_dim=7,world_model.checkpoint=checkpoints/dreamer/world_model.pth,world_model.deter_dim=512,world_model.discrete_dim=32,world_model.hidden_dim=512,world_model.obs_shape=[3,64,64],world_model.stoch_dim=32,world_model.type=dreamer
    id: ???
    num: ???
    config_name: transformer_rl
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.2.0
    version_base: '1.2'
    cwd: /home/necphy/ThuanNguyen/robot_learning_2026_TN/hw3
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/necphy/ThuanNguyen/robot_learning_2026_TN/hw3/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/necphy/ThuanNguyen/robot_learning_2026_TN/hw3/outputs/2026-03-30/14-28-29
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
